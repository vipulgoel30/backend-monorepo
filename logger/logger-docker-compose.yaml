# version: "3.8" # version is not required it is absolete

services:
  mongodb:
    image: mongo:noble
    container_name: logger_mongodb
    ports:
      - "27017:27017" # HOST:CONTAINER PORT
    volumes:
      - "logger_volume:/data/db"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: logger

  kafka-broker-1:
    image: apache/kafka:3.9.2-rc1
    container_name: logger_kafka_broker_1
    ports:
      - "9092:9092"

  # redis:
  #   image: redis/redis-stack # contains both redis-stack-server and redis-insights
  #   container_name: logger_redis_stack
  #   ports:
  #     - "6379:6379" # redis-server
  #     - "8001:8001" # redis-insights
  #   environment:
  #     REDIS_ARGS: "--requirepass redis-stack" # username : default password : redis-stack

  redis-server:
    image: redis:latest
    container_name: logger_redis_server
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "redis"] # Overwritting the CMD used as entry point (Existing only "redis-server") (Sets the username : default password : redis)

  redis-insights:
    image: redis/redisinsight
    container_name: logger_redis_insights
    ports:
      - "5540:5540"
    environment:
      RI_REDIS_USERNAME: default
      RI_REDIS_PASSWORD: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_HOST: redis-server

volumes:
  logger_volume:
    driver: local
